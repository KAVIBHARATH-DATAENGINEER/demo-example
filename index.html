<!DOCTYPE html>
<html>
<head>
 <title>User Input Arithmetic</title>
</head>
<body>
 <h2>Welcome to JavaScript Arithmetic Program</h2>
 Enter Value of A:
 <input type="number" id="a"><br><br>
 Enter Value of B:
 <input type="number" id="b"><br><br>
 <button onclick="calculate()">Calculate</button>
 <p id="output"></p>
 <script>
 function calculate() {
 let a = Number(document.getElementById("a").value);
 let b = Number(document.getElementById("b").value);
 let add = a + b;
 let sub = a - b;
 let mul = a * b;
 let div = a / b;
 document.getElementById("output").innerHTML =
 "Addition: " + add + "<br>" +
 "Subtraction: " + sub + "<br>" +
 "Multiplication: " + mul + "<br>" +
 "Division: " + div;
 }
 </script>
</body>
</html>
